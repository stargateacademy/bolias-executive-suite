<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolias Bank — AI Executive Suite</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #080C12; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .agent-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const AGENTS = {
      CEO: {
        id: "CEO", title: "AI CEO", subtitle: "Strategy & Governance",
        color: "#C9A84C", bg: "rgba(201,168,76,0.08)", border: "rgba(201,168,76,0.3)", icon: "◈",
        systemPrompt: `You are the AI CEO of Bolias Bank — a Self-Regulated Hybrid Financial Institution (SRHFI) issuing AED-backed stablecoin (BOL-AED) on its own ZK blockchain. You govern the institution strategically. Live data: Reserve Ratio: 107.3%, VaR Utilisation: 68%, Open Approvals: 3, Compliance Alerts: 1 (Travel Rule hold on AED 18,500 transfer), Oracle Freshness: 4 mins ago, BOL-AED Supply: 247,500,000 AED, Mint Status: ACTIVE, LCR: 2.61x, Tier 1 Capital: AED 100M. Speak with authority, precision, and institutional gravitas. Keep responses concise (3-5 sentences), data-driven, and action-oriented. Reference specific numbers when relevant. Never break character. End key decisions with [LOGGED TO AUDIT TRAIL].`,
        quickPrompts: ["Give me the morning brief", "What is our reserve health today?", "Any decisions pending my approval?", "What governance proposals are active?"]
      },
      CFO: {
        id: "CFO", title: "AI CFO", subtitle: "Treasury & Capital",
        color: "#4CA8C9", bg: "rgba(76,168,201,0.08)", border: "rgba(76,168,201,0.3)", icon: "◉",
        systemPrompt: `You are the AI CFO of Bolias Bank — a Self-Regulated Hybrid Financial Institution issuing BOL-AED stablecoin. You manage treasury and capital. Live data: BOL-AED Supply: 247.5M AED, Adjusted Reserves: 265.2M AED (107.3% ratio), Reserve Breakdown: 20% cash AED 53M (T+0), 60% UAE Sovereign Bills AED 159M (T+1), 20% Corporate Sukuk AED 53.2M (T+7), LCR: 2.61x, Net Reserve Yield: 4.1%, Payout Queue: 3 pending totalling AED 2.1M, Reconciliation Status: CLEAN, Tier 1 Capital: AED 100M, Operational Runway: 24 months. Speak with financial precision and institutional rigor. Keep responses concise and data-driven. Sign off with [TREASURY LOG UPDATED].`,
        quickPrompts: ["What's our adjusted reserve ratio?", "Any reconciliation breaks today?", "Payout queue status?", "Reserve portfolio breakdown?"]
      },
      CRO: {
        id: "CRO", title: "AI CRO", subtitle: "Risk & Capital Adequacy",
        color: "#C94C4C", bg: "rgba(201,76,76,0.08)", border: "rgba(201,76,76,0.3)", icon: "◎",
        systemPrompt: `You are the AI CRO of Bolias Bank — a Self-Regulated Hybrid Financial Institution. You monitor risk and capital adequacy. Live data: Reserve Ratio: 107.3% (mint threshold: 105%), Stress-Adjusted Ratio: 101.6%, VaR Utilisation: 68% (limit: 85%), Open Interest: AED 142M, LCR: 2.61x, Active Circuit Breakers: NONE, Oracle Freshness: 4 mins ago, Max Leverage Tier 4 Institutional: 25x, Insurance Fund: AED 1.42M (1% of OI), Risk Posture: MODERATE-GREEN. Speak with analytical precision. Surface risks proactively. Keep responses concise. Sign off with [RISK POSTURE UPDATED].`,
        quickPrompts: ["Are we within reserve ratio limits?", "What's our VaR utilization?", "Simulate a 30% redemption event", "Any stress triggers active?"]
      },
      COO: {
        id: "COO", title: "AI COO", subtitle: "Operations & Delivery",
        color: "#4CC980", bg: "rgba(76,201,128,0.08)", border: "rgba(76,201,128,0.3)", icon: "◇",
        systemPrompt: `You are the AI COO of Bolias Bank — a Self-Regulated Hybrid Financial Institution. You oversee operations and delivery. Live data: MVP Build Week: 6 of 8, Current Sprint: AI Executive Suite integration, Workstream RAG — Smart Contracts: GREEN (complete), Backend Services: GREEN (complete), Web App: AMBER (KYC flow 80%), Mobile App: RED (not started — Week 7), AI Suite: AMBER (wiring in progress), Admin Panel: GREEN, Incidents this week: 0, SLA Breaches: 0, Pending KYC Reviews: 7, System Uptime: 99.97%, Next milestone: Mobile app scaffold by end of week. Speak with operational clarity. Be direct about blockers. Sign off with [OPS LOG UPDATED].`,
        quickPrompts: ["What's our delivery RAG status?", "What's blocking the mobile launch?", "Any operational incidents today?", "KYC queue status?"]
      },
      CCO: {
        id: "CCO", title: "AI CCO", subtitle: "Compliance & AML",
        color: "#9B4CC9", bg: "rgba(155,76,201,0.08)", border: "rgba(155,76,201,0.3)", icon: "◆",
        systemPrompt: `You are the AI CCO (Chief Compliance Officer / MLRO) of Bolias Bank — a Self-Regulated Hybrid Financial Institution. You oversee KYC, AML, Travel Rule, and regulatory compliance. Live data: Active Travel Rule Holds: 1 (AED 18,500 outbound — VASP counterparty unverified, hold TTL: 18 hours remaining), Customers Needing EDD: 3, STR/SAR Drafts Pending: 0, KYC Pending Reviews: 7 (entities), Sanctions Screening: ALL CLEAR, Jurisdiction Flags: 0, Policy Version: v2.3.1 (current, anchored on-chain), ComplianceRegistry: LIVE. Speak with regulatory precision. Be thorough on compliance matters. Sign off with [COMPLIANCE LOG UPDATED].`,
        quickPrompts: ["Why was the withdrawal held?", "Which customers need EDD?", "Travel Rule status today?", "KYC queue — who needs review?"]
      }
    };

    const METRICS = [
      { label: "Reserve Ratio", value: "107.3%", status: "green", sub: "Threshold: 105%" },
      { label: "BOL-AED Supply", value: "247.5M", status: "blue", sub: "AED Stablecoin" },
      { label: "LCR", value: "2.61x", status: "green", sub: "Floor: 1.25x" },
      { label: "VaR Utilisation", value: "68%", status: "amber", sub: "Limit: 85%" },
      { label: "Mint Status", value: "ACTIVE", status: "green", sub: "Oracle: 4 min ago" },
      { label: "Compliance", value: "1 HOLD", status: "amber", sub: "Travel Rule" },
    ];

    const STATUS_COLORS = { green: "#4CC980", amber: "#C9A84C", red: "#C94C4C", blue: "#4CA8C9" };

    const FONT = "'EB Garamond', Georgia, serif";
    const MONO = "'JetBrains Mono', monospace";

    function App() {
      const [activeAgent, setActiveAgent] = useState("CEO");
      const [conversations, setConversations] = useState({ CEO: [], CFO: [], CRO: [], COO: [], CCO: [] });
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [view, setView] = useState("cockpit");
      const [time, setTime] = useState(new Date());
      const chatEndRef = useRef(null);

      useEffect(() => {
        const t = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [conversations, loading]);

      const agent = AGENTS[activeAgent];
      const msgs = conversations[activeAgent];

      async function sendMessage(text) {
        if (!text.trim() || loading) return;
        const userMsg = { role: "user", content: text };
        const updated = [...msgs, userMsg];
        setConversations(prev => ({ ...prev, [activeAgent]: updated }));
        setInput("");
        setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: agent.systemPrompt,
              messages: updated.map(m => ({ role: m.role, content: m.content })),
            }),
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || "Unable to process request.";
          setConversations(prev => ({ ...prev, [activeAgent]: [...updated, { role: "assistant", content: reply }] }));
        } catch {
          setConversations(prev => ({ ...prev, [activeAgent]: [...updated, { role: "assistant", content: "Connection error. Please retry." }] }));
        }
        setLoading(false);
      }

      return (
        <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#080C12", color: "#E8E4D9", fontFamily: FONT, overflow: "hidden" }}>
          {/* Top Bar */}
          <div style={{ height: 56, borderBottom: "1px solid rgba(201,168,76,0.2)", padding: "0 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, background: "rgba(201,168,76,0.02)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 30, height: 30, border: "1px solid #C9A84C", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: "#C9A84C" }}>◈</div>
              <div>
                <div style={{ fontSize: 13, letterSpacing: "0.2em", color: "#C9A84C", textTransform: "uppercase" }}>Bolias Bank</div>
                <div style={{ fontSize: 9, color: "rgba(232,228,217,0.35)", letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: MONO }}>AI Executive Suite · MVP Demo</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              {[["cockpit", "Command Centre"], ["agent", "Agent Chat"]].map(([v, label]) => (
                <button key={v} onClick={() => setView(v)} style={{
                  padding: "5px 14px", fontSize: 9, letterSpacing: "0.15em", textTransform: "uppercase",
                  border: "1px solid", fontFamily: MONO,
                  borderColor: view === v ? "#C9A84C" : "rgba(232,228,217,0.12)",
                  background: view === v ? "rgba(201,168,76,0.1)" : "transparent",
                  color: view === v ? "#C9A84C" : "rgba(232,228,217,0.4)",
                  cursor: "pointer",
                }}>{label}</button>
              ))}
            </div>
            <div style={{ fontSize: 11, color: "rgba(232,228,217,0.35)", fontFamily: MONO }}>
              {time.toLocaleTimeString("en-AE", { hour12: false })} · Dubai, UAE
            </div>
          </div>

          {view === "cockpit"
            ? <CockpitView metrics={METRICS} onSelectAgent={(id) => { setActiveAgent(id); setView("agent"); }} />
            : <AgentView agent={agent} msgs={msgs} loading={loading} input={input} setInput={setInput}
                sendMessage={sendMessage} activeAgent={activeAgent} setActiveAgent={setActiveAgent} chatEndRef={chatEndRef} />
          }
        </div>
      );
    }

    function CockpitView({ metrics, onSelectAgent }) {
      return (
        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>
          {/* Header */}
          <div style={{ marginBottom: 32, display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
            <div style={{ borderLeft: "2px solid #C9A84C", paddingLeft: 18 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.25em", color: "#C9A84C", textTransform: "uppercase", marginBottom: 5, fontFamily: MONO }}>Executive Command Centre</div>
              <div style={{ fontSize: 26, fontWeight: 400, letterSpacing: "0.02em" }}>AI Governance Dashboard</div>
              <div style={{ fontSize: 13, color: "rgba(232,228,217,0.4)", marginTop: 5 }}>Five AI executives governing Bolias Bank in real time · BOL-AED Testnet</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", border: "1px solid rgba(76,201,128,0.3)", background: "rgba(76,201,128,0.06)" }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#4CC980" }} />
                <span style={{ fontSize: 9, letterSpacing: "0.2em", textTransform: "uppercase", color: "#4CC980", fontFamily: MONO }}>All Systems Operational</span>
              </div>
            </div>
          </div>

          {/* Metrics */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", border: "1px solid rgba(201,168,76,0.12)", marginBottom: 32, background: "rgba(201,168,76,0.03)" }}>
            {metrics.map((m, i) => (
              <div key={i} style={{ padding: "14px 12px", borderRight: i < 5 ? "1px solid rgba(201,168,76,0.08)" : "none" }}>
                <div style={{ fontSize: 8, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(232,228,217,0.35)", marginBottom: 8, fontFamily: MONO }}>{m.label}</div>
                <div style={{ fontSize: 19, fontFamily: MONO, color: STATUS_COLORS[m.status], fontWeight: 500 }}>{m.value}</div>
                <div style={{ fontSize: 9, color: "rgba(232,228,217,0.25)", marginTop: 4, fontFamily: MONO }}>{m.sub}</div>
              </div>
            ))}
          </div>

          {/* Agent Cards */}
          <div style={{ fontSize: 9, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(232,228,217,0.25)", marginBottom: 12, fontFamily: MONO }}>AI Executive Suite — Select to engage</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 12, marginBottom: 32 }}>
            {Object.values(AGENTS).map(a => (
              <button key={a.id} onClick={() => onSelectAgent(a.id)} style={{
                background: a.bg, border: `1px solid ${a.border}`, padding: "22px 18px",
                cursor: "pointer", textAlign: "left", fontFamily: FONT, display: "flex", flexDirection: "column", gap: 10,
                transition: "border-color 0.2s",
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = AGENTS[a.id].color}
                onMouseLeave={e => e.currentTarget.style.borderColor = AGENTS[a.id].border}
              >
                <div style={{ fontSize: 26, color: a.color }}>{a.icon}</div>
                <div>
                  <div style={{ fontSize: 14, color: a.color, letterSpacing: "0.04em" }}>{a.title}</div>
                  <div style={{ fontSize: 9, color: "rgba(232,228,217,0.35)", letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 3, fontFamily: MONO }}>{a.subtitle}</div>
                </div>
                <div style={{ fontSize: 11, color: "rgba(232,228,217,0.45)", lineHeight: 1.6, marginTop: 2 }}>"{a.quickPrompts[0]}"</div>
                <div style={{ marginTop: "auto", fontSize: 8, letterSpacing: "0.2em", textTransform: "uppercase", color: a.color, borderTop: `1px solid ${a.border}`, paddingTop: 10, fontFamily: MONO }}>Engage Agent →</div>
              </button>
            ))}
          </div>

          {/* Journeys */}
          <div style={{ border: "1px solid rgba(232,228,217,0.07)", padding: "20px 22px" }}>
            <div style={{ fontSize: 9, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(232,228,217,0.25)", marginBottom: 14, fontFamily: MONO }}>MVP Demo Journeys — 6 Customer Flows</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
              {[
                { id: "A", label: "AI CEO Daily Brief", agent: "CEO", status: "green" },
                { id: "B", label: "KYC → Mint BOL-AED", agent: "CCO", status: "green" },
                { id: "C", label: "Redeem → Fiat Payout", agent: "CFO", status: "green" },
                { id: "D", label: "Travel Rule Hold", agent: "CCO", status: "amber" },
                { id: "E", label: "Reserve Stress Event", agent: "CRO", status: "green" },
                { id: "F", label: "Governance Proposal", agent: "CEO", status: "green" },
              ].map(j => (
                <div key={j.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)" }}>
                  <div style={{ width: 22, height: 22, border: `1px solid ${STATUS_COLORS[j.status]}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: STATUS_COLORS[j.status], fontFamily: MONO, flexShrink: 0 }}>{j.id}</div>
                  <div>
                    <div style={{ fontSize: 11 }}>{j.label}</div>
                    <div style={{ fontSize: 8, color: "rgba(232,228,217,0.35)", textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: MONO }}>AI {j.agent}</div>
                  </div>
                  <div style={{ marginLeft: "auto", width: 5, height: 5, borderRadius: "50%", background: STATUS_COLORS[j.status] }} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function AgentView({ agent, msgs, loading, input, setInput, sendMessage, activeAgent, setActiveAgent, chatEndRef }) {
      return (
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          {/* Sidebar */}
          <div style={{ width: 190, borderRight: "1px solid rgba(201,168,76,0.12)", flexShrink: 0, padding: "16px 0", background: "rgba(201,168,76,0.015)", overflowY: "auto" }}>
            <div style={{ padding: "0 14px 12px", fontSize: 8, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(232,228,217,0.25)", fontFamily: MONO }}>Executive Suite</div>
            {Object.values(AGENTS).map(a => (
              <button key={a.id} onClick={() => setActiveAgent(a.id)} style={{
                width: "100%", padding: "12px 14px", textAlign: "left", cursor: "pointer",
                background: activeAgent === a.id ? a.bg : "transparent",
                borderLeft: `2px solid ${activeAgent === a.id ? a.color : "transparent"}`,
                border: "none", borderLeft: `2px solid ${activeAgent === a.id ? a.color : "transparent"}`,
                transition: "all 0.15s", fontFamily: FONT,
              }}>
                <div style={{ fontSize: 13, color: activeAgent === a.id ? a.color : "rgba(232,228,217,0.5)" }}>{a.icon} {a.title}</div>
                <div style={{ fontSize: 8, color: "rgba(232,228,217,0.25)", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: 2, fontFamily: MONO }}>{a.subtitle}</div>
              </button>
            ))}
            <div style={{ margin: "16px 14px 0", paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.05)", fontSize: 8, color: "rgba(232,228,217,0.2)", fontFamily: MONO, lineHeight: 1.7 }}>
              Policy Guard Active<br />Audit Trail On<br />ZK Chain: Testnet
            </div>
          </div>

          {/* Chat */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Agent Header */}
            <div style={{ padding: "16px 24px", borderBottom: `1px solid ${agent.border}`, background: agent.bg, flexShrink: 0, display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 28, color: agent.color }}>{agent.icon}</div>
              <div>
                <div style={{ fontSize: 17, color: agent.color, letterSpacing: "0.04em" }}>{agent.title}</div>
                <div style={{ fontSize: 9, color: "rgba(232,228,217,0.35)", letterSpacing: "0.12em", textTransform: "uppercase", fontFamily: MONO }}>{agent.subtitle} · Policy Guard Active · Audit Trail On</div>
              </div>
              <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", border: `1px solid ${agent.color}`, background: agent.bg }}>
                <div style={{ width: 5, height: 5, borderRadius: "50%", background: agent.color }} />
                <span style={{ fontSize: 8, letterSpacing: "0.2em", textTransform: "uppercase", color: agent.color, fontFamily: MONO }}>Live</span>
              </div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", padding: "22px 24px", display: "flex", flexDirection: "column", gap: 18 }}>
              {msgs.length === 0 && (
                <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                  <div style={{ padding: "18px 20px", border: `1px solid ${agent.border}`, background: agent.bg }} className="fade-in">
                    <div style={{ fontSize: 10, color: agent.color, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6, fontFamily: MONO }}>{agent.title} — Online</div>
                    <div style={{ fontSize: 13, color: "rgba(232,228,217,0.65)", lineHeight: 1.75 }}>
                      I am your {agent.subtitle.toLowerCase()} AI executive. All interactions are logged to the immutable audit trail and anchored on-chain. Ask me anything within my mandate.
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 8, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(232,228,217,0.25)", marginBottom: 10, fontFamily: MONO }}>Suggested queries</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {agent.quickPrompts.map((p, i) => (
                        <button key={i} onClick={() => sendMessage(p)} style={{
                          padding: "9px 14px", background: "transparent",
                          border: "1px solid rgba(232,228,217,0.08)", cursor: "pointer",
                          textAlign: "left", fontSize: 12, color: "rgba(232,228,217,0.55)",
                          fontFamily: FONT, transition: "all 0.15s",
                        }}
                          onMouseEnter={e => { e.currentTarget.style.borderColor = agent.color; e.currentTarget.style.color = "#E8E4D9"; }}
                          onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(232,228,217,0.08)"; e.currentTarget.style.color = "rgba(232,228,217,0.55)"; }}
                        >{p}</button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {msgs.map((m, i) => (
                <div key={i} className="fade-in" style={{ display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start" }}>
                  <div style={{ fontSize: 8, letterSpacing: "0.15em", textTransform: "uppercase", color: m.role === "user" ? "rgba(232,228,217,0.3)" : agent.color, marginBottom: 5, fontFamily: MONO }}>
                    {m.role === "user" ? "You" : agent.title}
                  </div>
                  <div style={{
                    maxWidth: "74%", padding: "12px 16px",
                    background: m.role === "user" ? "rgba(232,228,217,0.04)" : agent.bg,
                    border: `1px solid ${m.role === "user" ? "rgba(232,228,217,0.08)" : agent.border}`,
                    fontSize: 13, lineHeight: 1.75, color: "#E8E4D9",
                  }}>{m.content}</div>
                </div>
              ))}

              {loading && (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start" }}>
                  <div style={{ fontSize: 8, letterSpacing: "0.15em", textTransform: "uppercase", color: agent.color, marginBottom: 5, fontFamily: MONO }}>{agent.title}</div>
                  <div style={{ padding: "12px 16px", background: agent.bg, border: `1px solid ${agent.border}`, display: "flex", gap: 5, alignItems: "center" }}>
                    {[0, 1, 2].map(d => (
                      <div key={d} style={{ width: 5, height: 5, borderRadius: "50%", background: agent.color, animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${d * 0.2}s` }} />
                    ))}
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Input */}
            <div style={{ padding: "14px 24px", borderTop: "1px solid rgba(201,168,76,0.12)", background: "rgba(0,0,0,0.25)", flexShrink: 0 }}>
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendMessage(input)}
                  placeholder={`Query ${agent.title}...`}
                  style={{
                    flex: 1, padding: "10px 14px", background: "rgba(232,228,217,0.03)",
                    border: "1px solid rgba(232,228,217,0.1)", color: "#E8E4D9",
                    fontSize: 13, fontFamily: FONT, outline: "none",
                  }}
                  onFocus={e => e.target.style.borderColor = agent.color}
                  onBlur={e => e.target.style.borderColor = "rgba(232,228,217,0.1)"}
                />
                <button onClick={() => sendMessage(input)} disabled={loading || !input.trim()} style={{
                  padding: "10px 20px", background: "transparent", border: `1px solid ${agent.color}`,
                  color: agent.color, cursor: loading || !input.trim() ? "default" : "pointer",
                  fontSize: 9, letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: MONO,
                  opacity: loading || !input.trim() ? 0.35 : 1, transition: "opacity 0.15s",
                }}>Send</button>
              </div>
              <div style={{ fontSize: 8, color: "rgba(232,228,217,0.18)", marginTop: 6, fontFamily: MONO }}>
                All interactions logged to immutable audit trail · Policy Guard active · Powered by Claude AI
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
